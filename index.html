<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dotted.life – @levon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="grain" aria-hidden="true"></div>
    <div class="bg-glow" id="bg-glow"></div>

    <main class="content">

        <!-- Oberer Block: Profil + Buttons nebeneinander -->
        <div class="top-section">

            <!-- Profil zentriert -->
            <section class="profile">
                <div class="avatar-wrap">
                    <img class="avatar" src="assets/avatar.jpg" alt="Levon"
                         onerror="this.style.display='none';this.parentElement.classList.add('avatar-fallback')">
                </div>
                <h1 class="username">@levon</h1>
                <div class="counter-wrap">
                    <span id="life-counter">–</span>
                    <span class="counter-label">Sekunden</span>
                </div>
                <p class="bio">Ich stelle mir häufig die Frage, ob ich mache, was ich machen will. Und ich suche noch immer nach der Antwort.</p>
                <div class="social-links">
                    <a href="https://instagram.com/iminlovewithlevkoko" target="_blank" class="social-btn" aria-label="Instagram">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
                    </a>
                    <a href="https://youtube.com/@levon-levvt" target="_blank" class="social-btn" aria-label="YouTube">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 8s-.27-1.88-1.09-2.71c-1.04-1.09-2.2-1.09-2.73-1.15C15.64 4 12 4 12 4s-3.64 0-6.18.14c-.53.06-1.69.06-2.73 1.15C2.27 6.12 2 8 2 8S1.73 10.12 1.73 12.24v2c0 2.12.27 4.24.27 4.24s.27 1.88 1.09 2.71c1.04 1.09 2.4 1.06 3.01 1.17C8 22.37 12 22.4 12 22.4s3.64 0 6.18-.24c.53-.06 1.69-.06 2.73-1.15.82-.83 1.09-2.71 1.09-2.71S22.27 16.36 22.27 14.24v-2C22.27 10.12 22 8 22 8z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>
                    </a>
                    <a href="https://levvt.com" target="_blank" class="social-btn" aria-label="Website">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>
                    </a>
                </div>
            </section>

            <!-- Kategorie-Buttons rechts, auf gleicher Höhe -->
            <div id="category-buttons"></div>

        </div>

        <!-- Dot Grid -->
        <div id="lifespan-wrap">
            <div id="lifespan"></div>
        </div>

    </main>

    <footer class="site-footer">
        <span class="footer-dot">⬤</span> dotted.life
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
