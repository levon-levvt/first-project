<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dotted.life – @levon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="grain" aria-hidden="true"></div>
    <div class="bg-glow" id="bg-glow"></div>

    <main class="content">

        <!-- Profil Card -->
        <div class="profile-card">
            <div class="avatar-wrap">
                <img class="avatar" src="assets/avatar.jpg" alt="Levon"
                     onerror="this.style.display='none';this.parentElement.classList.add('avatar-fallback')">
            </div>
            <div class="profile-info">
                <h1 class="username">@levon</h1>
                <div class="counter-wrap">
                    <span id="life-counter">–</span>
                    <span class="counter-label">sekunden</span>
                </div>
                <p class="bio">Ich stelle mir häufig die Frage, ob ich mache, was ich machen will. Und ich suche noch immer nach der Antwort.</p>
            </div>
        </div>

        <!-- Kategorie-Buttons ÜBER dem Grid -->
        <div id="category-buttons"></div>

        <!-- Grid Card -->
        <div class="grid-card">
            <div id="lifespan"></div>
        </div>

    </main>

    <footer class="site-footer">
        <span class="footer-dots">●●●</span> dotted.life
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
